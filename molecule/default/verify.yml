---
- name: Verify
  hosts: all
  tasks:
    - name: Ensure Borgmatic is installed correctly
      ansible.builtin.command: borgmatic --version
      changed_when: false

    - name: Ensure Borg is installed correctly
      ansible.builtin.command: borg --version
      changed_when: false

    - name: Ensure produced YAML is valid
      ansible.builtin.command: |
        yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" /etc/borgmatic/config.yaml
      changed_when: false

    - name: Ensure borgmatic accepts the rendered config
      ansible.builtin.command: borgmatic --config /etc/borgmatic/config.yaml config validate
      changed_when: false

    - name: Read produced borgmatic config
      ansible.builtin.slurp:
        src: /etc/borgmatic/config.yaml
      register: borgbackup_rendered_config

    - name: Decode produced borgmatic config
      ansible.builtin.set_fact:
        borgbackup_rendered_config_yaml: "{{ borgbackup_rendered_config.content | b64decode }}"
        borgbackup_rendered_config_data: "{{ borgbackup_rendered_config.content | b64decode | from_yaml }}"

    - name: Ensure default borgmatic config is rendered
      ansible.builtin.assert:
        that:
          - "borgbackup_rendered_config_data.repositories[0].path == '/tmp/borgbackup-molecule-repo'"
          - "borgbackup_rendered_config_data.source_directories == ['/tmp/borgbackup-source']"
          - "borgbackup_rendered_config_data.exclude_patterns == ['/tmp/borgbackup-source/excluded']"
          - "borgbackup_rendered_config_data.encryption_passphrase == 'CHANGEME'"
          - "borgbackup_rendered_config_data.exclude_caches | bool"
          - "borgbackup_rendered_config_data.exclude_if_present == ['.nobackup']"
          - "borgbackup_rendered_config_data.umask == '0077'"
          - "borgbackup_rendered_config_data.keep_hourly == 3"
          - "borgbackup_rendered_config_data.keep_daily == 7"
          - "borgbackup_rendered_config_data.keep_weekly == 4"
          - "borgbackup_rendered_config_data.keep_monthly == 6"
          - "borgbackup_rendered_config_data.verbosity == 1"
          - "'Error while creating a backup.' not in borgbackup_rendered_config_yaml"
          - "'Starting backup.' not in borgbackup_rendered_config_yaml"
          - "'Finished backup.' not in borgbackup_rendered_config_yaml"

    - name: Read borgmatic cron file
      ansible.builtin.slurp:
        src: /etc/cron.d/borgmatic
      register: borgbackup_cron_file

    - name: Decode borgmatic cron file
      ansible.builtin.set_fact:
        borgbackup_cron_file_text: "{{ borgbackup_cron_file.content | b64decode }}"

    - name: Ensure cron invokes the rendered config
      ansible.builtin.assert:
        that:
          - "'borgmatic -c /etc/borgmatic/config.yaml' in borgbackup_cron_file_text"
          - "'PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin' in borgbackup_cron_file_text"

    - name: Create local borg repository
      ansible.builtin.command: borgmatic --config /etc/borgmatic/config.yaml repo-create --encryption repokey
      args:
        creates: /tmp/borgbackup-molecule-repo/config
      changed_when: true

    - name: Create a local borg archive
      ansible.builtin.command: borgmatic --config /etc/borgmatic/config.yaml create
      changed_when: true

    - name: List local borg archives
      ansible.builtin.command: borgmatic --config /etc/borgmatic/config.yaml repo-list
      changed_when: false
      register: borgbackup_archive_list

    - name: Ensure local backup archive was created
      ansible.builtin.assert:
        that:
          - "borgbackup_archive_list.stdout | length > 0"

    - name: Apply role with custom exclude_if_present and non-pip sudoers
      ansible.builtin.include_role:
        name: borgbase.ansible_role_borgbackup
      vars:
        borgbackup_install:
          method: none
        borgbackup_user:
          name: borgbackup-test
          group: borgbackup-test
          sudo: true
        borgbackup_timer:
          type: none
        borgbackup_config:
          name: sudoers.yaml
          repositories:
            - /tmp/borgbackup-molecule-repo
          source_directories:
            - /etc/hostname
          exclude_if_present:
            - .skipbackup

    - name: Read custom borgmatic config
      ansible.builtin.slurp:
        src: /etc/borgmatic/sudoers.yaml
      register: borgbackup_custom_config

    - name: Read generated sudoers rule
      ansible.builtin.slurp:
        src: /etc/sudoers.d/backup
      register: borgbackup_sudoers_rule

    - name: Decode custom config and sudoers rule
      ansible.builtin.set_fact:
        borgbackup_custom_config_yaml: "{{ borgbackup_custom_config.content | b64decode }}"
        borgbackup_sudoers_rule_text: "{{ borgbackup_sudoers_rule.content | b64decode }}"

    - name: Ensure custom list and non-pip sudoers paths are rendered
      ansible.builtin.assert:
        that:
          - "'.skipbackup' in borgbackup_custom_config_yaml"
          - "'.nobackup' not in borgbackup_custom_config_yaml"
          - "'/usr/bin/borg' in borgbackup_sudoers_rule_text"
          - "'/usr/bin/borgmatic -c /etc/borgmatic/sudoers.yaml' in borgbackup_sudoers_rule_text"
          - "'/usr/local/bin/borg' not in borgbackup_sudoers_rule_text"
          - "'/opt/borgmatic/bin/borg' not in borgbackup_sudoers_rule_text"

    - name: Ensure legacy hook variables are rejected
      block:
        - name: Apply role with a legacy hook variable
          ansible.builtin.include_role:
            name: borgbase.ansible_role_borgbackup
          vars:
            borgmatic_failure_command: echo legacy
            borgbackup_install:
              method: none
            borgbackup_timer:
              type: none
            borgbackup_config:
              repositories:
                - /tmp/borgbackup-molecule-repo
      rescue:
        - name: Store legacy hook rejection message
          ansible.builtin.set_fact:
            borgbackup_legacy_hook_rejection: "{{ ansible_failed_result.msg | default('') }}"

    - name: Confirm legacy hook rejection
      ansible.builtin.assert:
        that:
          - "'Replace legacy variables' in borgbackup_legacy_hook_rejection | default('')"
          - "'borgmatic_failure_command' in borgbackup_legacy_hook_rejection | default('')"
